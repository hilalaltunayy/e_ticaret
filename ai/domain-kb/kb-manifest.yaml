needs_review:
  - path: app/Models/RoleModels.php
    reason: Appears to overlap with RoleModel.php and may declare the same role model intent.
    related_domains:
      - user_role_permission
  - path: app/Controllers/Admin/Dashboard.php
    reason: No active route link is visible in Routes.php; may be legacy.
    related_domains:
      - admin_panel
      - dashboard_builder
  - path: app/Controllers/Admin/OrderController.php
    reason: No active route link is visible in Routes.php; Admin/Orders.php appears to be the primary admin order controller.
    related_domains:
      - order
      - admin_panel
  - path: app/Controllers/Admin/ShippingAutomation.php
    reason: Active routes point to ShippingAutomationController.php.
    related_domains:
